generator_ckpt: longlive_models/models/longlive_base.pt
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
# real_name: Wan2.1-T2V-1.3B
real_name: Wan2.1-T2V-1.3B
fake_name: Wan2.1-T2V-1.3B
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true # need to remove - 0 in denoising_step_list if warp_denoising_step is true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0
wandb_key: d5b02b05e30d8cb34c7b31c6ae10416fc26dcb66
wandb_entity: hapo-exp
wandb_project: longlive
sharding_strategy: hybrid_full
lr: 1.0e-05
lr_critic: 2.0e-06
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
data_path: longlive_models/prompts/vidprom_filtered_extended.txt
batch_size: 1
gradient_accumulation_steps: 1
ema_weight: 0.99
ema_start_step: 200
log_iters: 500
max_checkpoints: 1
max_iters: 3500

negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
generator_update_gap_choices:
- 3
- 4
- 5
image_or_video_shape:
- 1
- 129
- 16
- 60
- 104
distribution_loss: dmd
global_sink: false
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0
  local_attn_size: 12
  sink_size: 3

# Visualization
vis_interval: 100
vis_ema: false
vis_video_lengths:
- 126
val_batch_size: 1
val_data_path: longlive_models/prompts/vidprom_filtered_extended.txt

slice_last_frames: 21

streaming_training: true
streaming_chunk_size: 21
streaming_max_length: 129
adaptive_debug_log: false
streaming_max_length_schedule:
  - start_step: 0
    end_step: 400
    max_length: 39
  - start_step: 400
    end_step: 800
    max_length: 57
  - start_step: 800
    end_step: 1200
    max_length: 75
  - start_step: 1200
    end_step: 1600
    max_length: 93
  - start_step: 1600
    end_step: 2000
    max_length: 111
  - start_step: 2000
    end_step: 3500
    max_length: 129

streaming_min_new_frame: 18
train_first_chunk: true

last_step_only: false

## LoRA Configuration
adapter:
  type: "lora"
  rank: 256                    # LoRA rank (typical values: 8, 16, 32, 64)
  alpha: 256                   # LoRA alpha (typically same as rank, but can be different)
  dropout: 0.0                # LoRA dropout rate
  dtype: "bfloat16"          # Data type for LoRA parameters: "bfloat16", "float16", "float32"
  apply_to_critic: true       # Whether to apply LoRA to critic/fake_score model
  verbose: true              # Whether to print all target module names
